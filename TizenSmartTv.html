<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TV Player для Samsung Smart TV (4K)</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    background: #111;
    color: #fff;
    font-family: 'Arial', sans-serif;
    padding: 20px;
    font-size: 24px; /* увеличен для 4K */
}
.header {
    background: #0066cc;
    padding: 30px;
    text-align: center;
    border-radius: 10px;
    margin-bottom: 30px;
}
.header h1 {
    font-size: 48px;
    margin: 0;
}
.tabs {
    display: flex;
    background: #222;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 30px;
}
.tab {
    flex: 1;
    padding: 24px 10px;
    background: #333;
    border: none;
    color: #ccc;
    font-size: 28px;
    text-align: center;
    cursor: pointer;
    border-right: 2px solid #444;
}
.tab:last-child {
    border-right: none;
}
.tab.active {
    background: #0066cc;
    color: #fff;
    font-weight: bold;
}
.tab:focus {
    outline: 4px solid #00a8ff;
}
.channel-list {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 40px;
}
.channel-btn {
    background: #222;
    border: 4px solid #333;
    color: #fff;
    padding: 24px 16px;
    font-size: 26px;
    text-align: center;
    cursor: pointer;
    border-radius: 10px;
    width: calc(50% - 8px);
    box-sizing: border-box;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
}
@media (min-width: 1600px) {
    .channel-btn {
        width: calc(33.33% - 12px);
    }
}
.channel-btn.active {
    background: #0066cc;
    border-color: #00a8ff;
    font-weight: bold;
}
.channel-btn:focus {
    outline: 4px solid #00a8ff;
}
.player {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000;
    z-index: 1000;
    display: none;
    flex-direction: column;
}
.player.active {
    display: flex;
}
.player-header {
    background: #0066cc;
    padding: 24px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.player-title {
    font-size: 32px;
    font-weight: bold;
}
.player-close {
    background: #cc0000;
    border: none;
    color: #fff;
    width: 70px;
    height: 70px;
    font-size: 36px;
    border-radius: 50%;
    cursor: pointer;
}
.video-container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}
#video-player {
    width: 100%;
    max-width: 100%;
    max-height: 100%;
    background: #000;
    object-fit: contain; /* по умолчанию */
}
.player-controls {
    background: #222;
    padding: 24px;
    display: flex;
    justify-content: center;
    gap: 30px;
}
.ctrl-btn {
    background: #0066cc;
    border: none;
    color: #fff;
    padding: 20px 40px;
    font-size: 28px;
    border-radius: 10px;
    cursor: pointer;
    min-width: 200px;
}
.ctrl-btn:focus {
    outline: 4px solid #fff;
}
.radio-panel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #222;
    padding: 24px 30px;
    border-top: 6px solid #0066cc;
    display: none;
    z-index: 900;
}
.radio-panel.active {
    display: block;
}
.radio-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.radio-text {
    flex: 1;
}
.radio-name {
    font-size: 32px;
    font-weight: bold;
    margin-bottom: 10px;
}
.radio-status {
    font-size: 24px;
    color: #aaa;
}
.radio-controls {
    display: flex;
    gap: 20px;
}
.radio-btn {
    background: #0066cc;
    border: none;
    color: #fff;
    width: 80px;
    height: 80px;
    font-size: 36px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}
.stop-btn {
    background: #cc0000;
}
.info-panel {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(0,0,0,0.8);
    padding: 20px 30px;
    border-radius: 10px;
    font-size: 28px;
    color: #0f0;
    display: none;
    z-index: 2000;
}
.pagination {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 30px 0;
}
.page-btn {
    background: #333;
    border: none;
    color: #fff;
    padding: 16px 30px;
    border-radius: 8px;
    font-size: 28px;
    cursor: pointer;
}
.page-btn.active {
    background: #0066cc;
}
.status-bar {
    position: fixed;
    bottom: 15px;
    left: 20px;
    color: #888;
    font-size: 22px;
}
</style>
</head>
<body>

<div class="header">
    <h1>📺 ТЕЛЕВИЗОР PRO (4K)</h1>
</div>

<div class="tabs">
    <button class="tab active" onclick="showSection('tv')">ТЕЛЕКАНАЛЫ</button>
    <button class="tab" onclick="showSection('radio')">РАДИО</button>
    <button class="tab" onclick="showSection('webcams')">КАМЕРЫ</button>
</div>

<div class="pagination" id="pagination"></div>

<div id="tv-section">
    <div class="channel-list" id="tv-channels"></div>
</div>
<div id="radio-section" style="display:none">
    <div class="channel-list" id="radio-channels"></div>
</div>
<div id="webcams-section" style="display:none">
    <div class="channel-list" id="webcams-channels"></div>
</div>

<div class="player" id="player">
    <div class="player-header">
        <div class="player-title" id="player-title">Загрузка...</div>
        <button class="player-close" onclick="closePlayer()">✕</button>
    </div>
    <div class="video-container">
        <video id="video-player" controls></video>
    </div>
    <div class="player-controls">
        <button class="ctrl-btn" onclick="prevChannel()">◀ ПРЕДЫДУЩИЙ</button>
        <button class="ctrl-btn" onclick="nextChannel()">СЛЕДУЮЩИЙ ▶</button>
        <button class="ctrl-btn" onclick="toggleFullscreen()">ПОЛНЫЙ ЭКРАН</button>
        <button class="ctrl-btn" onclick="toggleVideoFit()">ФОРМАТ</button>
    </div>
</div>

<div class="radio-panel" id="radio-panel">
    <div class="radio-info">
        <div class="radio-text">
            <div class="radio-name" id="radio-title">Выберите радиостанцию</div>
            <div class="radio-status" id="radio-status">Готов к работе</div>
        </div>
        <div class="radio-controls">
            <button class="radio-btn" onclick="toggleRadio()" id="radio-toggle">▶</button>
            <button class="radio-btn stop-btn" onclick="stopRadio()">⏹</button>
            <button class="radio-btn" onclick="nextRadio()">►|</button>
        </div>
    </div>
</div>

<div class="info-panel" id="info-panel"></div>
<div class="status-bar" id="status-bar">Готов к работе</div>

function getCurrentChannels() {
    if (currentSection === 'tv') return TV_CHANNELS;
    if (currentSection === 'radio') return RADIO_STATIONS;
    return WEBCAMS;
}

function getSectionName(s) {
    if (s === 'tv') return 'Телеканалы';
    if (s === 'radio') return 'Радиостанции';
    return 'Веб-камеры';
}

function updateStatus(msg) {
    document.getElementById('status-bar').innerHTML = msg;
    console.log(msg);
}

function showInfo(msg, duration) {
    var panel = document.getElementById('info-panel');
    panel.innerHTML = msg;
    panel.style.display = 'block';
    if (duration) {
        setTimeout(function() {
            panel.style.display = 'none';
        }, duration);
    }
}

function stopAllMedia() {
    closePlayer();
    if (audioElement) {
        audioElement.pause();
        audioElement.src = '';
        audioElement = null;
    }
    document.getElementById('radio-panel').className = 'radio-panel';
    if (errorTimeout) clearTimeout(errorTimeout);
}

function updatePagination(totalItems) {
    var paginationDiv = document.getElementById('pagination');
    var totalPages = Math.ceil(totalItems / itemsPerPage);
    if (totalPages <= 1) {
        paginationDiv.innerHTML = '';
        return;
    }
    var html = '';
    for (var i = 0; i < totalPages; i++) {
        var activeClass = (i === currentPage) ? 'active' : '';
        html += '<button class="page-btn ' + activeClass + '" onclick="goToPage(' + i + ')">' + (i+1) + '</button>';
    }
    paginationDiv.innerHTML = html;
}

function goToPage(page) {
    currentPage = page;
    loadChannels();
}

function loadChannels() {
    // Правильное определение ID контейнера
    var containerId = currentSection + '-channels';
    var container = document.getElementById(containerId);
    if (!container) return;
    
    var channels = getCurrentChannels();
    container.innerHTML = '';
    var start = currentPage * itemsPerPage;
    var end = Math.min(start + itemsPerPage, channels.length);
    for (var i = start; i < end; i++) {
        var channel = channels[i];
        var btn = document.createElement('button');
        btn.className = 'channel-btn';
        btn.innerHTML = channel.name;
        btn.setAttribute('tabindex', '0');
        (function(idx) {
            btn.onclick = function() { playChannel(idx); };
        })(i);
        container.appendChild(btn);
    }
    updatePagination(channels.length);
    updateStatus(getSectionName(currentSection) + ': ' + channels.length + ' каналов, стр. ' + (currentPage+1));
}

function showSection(section) {
    if (currentSection === section) return;
    stopAllMedia();
    currentSection = section;
    currentIndex = -1;
    currentPage = 0;
    
    var tabs = document.getElementsByClassName('tab');
    for (var i = 0; i < tabs.length; i++) {
        tabs[i].className = 'tab';
        var onclickAttr = tabs[i].getAttribute('onclick');
        if (onclickAttr && onclickAttr.indexOf(section) !== -1) {
            tabs[i].className = 'tab active';
        }
    }
    
    document.getElementById('tv-section').style.display = 'none';
    document.getElementById('radio-section').style.display = 'none';
    document.getElementById('webcams-section').style.display = 'none';
    document.getElementById(section + '-section').style.display = 'block';
    
    loadChannels();
    updateStatus("Раздел: " + getSectionName(section));
}

function playChannel(index) {
    var channels = getCurrentChannels();
    if (index < 0 || index >= channels.length) return;
    currentIndex = index;
    var item = channels[index];
    
    // Подсветка активной кнопки
    var btns = document.querySelectorAll('#' + currentSection + '-channels .channel-btn');
    for (var i = 0; i < btns.length; i++) {
        btns[i].className = 'channel-btn';
    }
    var pageIndex = index - (currentPage * itemsPerPage);
    if (btns[pageIndex]) btns[pageIndex].className = 'channel-btn active';
    
    if (currentSection === 'radio') {
        playRadio(item);
    } else {
        playVideo(item);
    }
    updateStatus("Играет: " + item.name);
    showInfo(item.name, 2000);
}

function playVideo(item) {
    if (audioElement) stopRadio();
    
    videoPlayer = document.getElementById('video-player');
    videoPlayer.onerror = null;
    videoPlayer.oncanplay = null;
    if (errorTimeout) clearTimeout(errorTimeout);
    
    document.getElementById('player-title').innerHTML = item.name;
    document.getElementById('player').className = 'player active';
    
    videoPlayer.src = item.url;
    videoPlayer.load();
    
    errorTimeout = setTimeout(function() {
        if (videoPlayer.paused || videoPlayer.readyState === 0) {
            showInfo("Не удалось загрузить, переключение...", 1500);
            nextChannel();
        }
    }, 10000);
    
    videoPlayer.onerror = function() {
        if (errorTimeout) clearTimeout(errorTimeout);
        showInfo("Ошибка воспроизведения, переключение...", 1500);
        setTimeout(nextChannel, 2000);
    };
    
    videoPlayer.oncanplay = function() {
        if (errorTimeout) clearTimeout(errorTimeout);
        videoPlayer.play().catch(function(e) {
            showInfo("Ошибка запуска, переключение...", 1500);
            setTimeout(nextChannel, 2000);
        });
    };
    
    videoPlayer.play().catch(function(e) {});
}

function playRadio(item) {
    closePlayer();
    if (audioElement) {
        audioElement.pause();
        audioElement.src = '';
        audioElement = null;
    }
    
    audioElement = new Audio();
    audioElement.src = item.url;
    audioElement.crossOrigin = 'anonymous';
    
    audioElement.onplay = function() {
        document.getElementById('radio-toggle').innerHTML = '⏸';
        document.getElementById('radio-status').innerHTML = 'Играет';
    };
    audioElement.onpause = function() {
        document.getElementById('radio-toggle').innerHTML = '▶';
        document.getElementById('radio-status').innerHTML = 'Пауза';
    };
    audioElement.onerror = function() {
        document.getElementById('radio-status').innerHTML = 'Ошибка соединения';
        showInfo("Ошибка радио, переключение...", 1500);
        setTimeout(nextChannel, 2000);
    };
    
    document.getElementById('radio-panel').className = 'radio-panel active';
    document.getElementById('radio-title').innerHTML = item.name;
    document.getElementById('radio-status').innerHTML = 'Загрузка...';
    
    setTimeout(function() {
        audioElement.play().catch(function(e) {
            document.getElementById('radio-status').innerHTML = 'Ошибка воспроизведения';
            showInfo("Не удалось запустить радио", 1500);
        });
    }, 500);
}

function toggleRadio() {
    if (audioElement) {
        if (audioElement.paused) audioElement.play();
        else audioElement.pause();
    }
}
function stopRadio() {
    if (audioElement) {
        audioElement.pause();
        audioElement.src = '';
        audioElement = null;
    }
    document.getElementById('radio-panel').className = 'radio-panel';
    updateStatus("Радио остановлено");
}
function nextRadio() {
    if (currentSection === 'radio') nextChannel();
}

function closePlayer() {
    var playerDiv = document.getElementById('player');
    if (playerDiv.className.indexOf('active') !== -1) {
        var vp = document.getElementById('video-player');
        vp.pause();
        vp.src = '';
        vp.onerror = null;
        vp.oncanplay = null;
        playerDiv.className = 'player';
        if (errorTimeout) clearTimeout(errorTimeout);
        updateStatus("Плеер закрыт");
    }
}

function toggleFullscreen() {
    var player = document.getElementById('player');
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        if (player.requestFullscreen) player.requestFullscreen();
        else if (player.webkitRequestFullscreen) player.webkitRequestFullscreen();
        // Для Tizen также может потребоваться webkitRequestFullScreen
        if (player.webkitRequestFullScreen) player.webkitRequestFullScreen();
    } else {
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        else if (document.webkitCancelFullScreen) document.webkitCancelFullScreen();
    }
}

function toggleVideoFit() {
    var video = document.getElementById('video-player');
    videoFitMode = (videoFitMode + 1) % 3;
    switch(videoFitMode) {
        case 0: video.style.objectFit = 'contain'; showInfo('Режим: По размеру (без обрезки)', 1500); break;
        case 1: video.style.objectFit = 'cover'; showInfo('Режим: Заполнить (с обрезкой)', 1500); break;
        case 2: video.style.objectFit = 'fill'; showInfo('Режим: Растянуть', 1500); break;
    }
}

function prevChannel() {
    var channels = getCurrentChannels();
    if (channels.length === 0) return;
    var newIndex = (currentIndex - 1 + channels.length) % channels.length;
    var newPage = Math.floor(newIndex / itemsPerPage);
    if (newPage !== currentPage) {
        currentPage = newPage;
        loadChannels();
    }
    playChannel(newIndex);
}
function nextChannel() {
    var channels = getCurrentChannels();
    if (channels.length === 0) return;
    var newIndex = (currentIndex + 1) % channels.length;
    var newPage = Math.floor(newIndex / itemsPerPage);
    if (newPage !== currentPage) {
        currentPage = newPage;
        loadChannels();
    }
    playChannel(newIndex);
}

function setupKeyboard() {
    document.body.setAttribute('tabindex', '0');
    document.body.focus();
    document.onkeydown = function(e) {
        var key = e.keyCode || e.which;
        if (key === 27) { // ESC
            closePlayer();
            e.preventDefault();
            return;
        }
        if (key === 37) { // left
            if (document.getElementById('player').className.indexOf('active') !== -1) {
                prevChannel();
            } else {
                var tabs = ['tv', 'radio', 'webcams'];
                var cur = tabs.indexOf(currentSection);
                var newTab = (cur - 1 + tabs.length) % tabs.length;
                showSection(tabs[newTab]);
            }
            e.preventDefault();
        } else if (key === 39) { // right
            if (document.getElementById('player').className.indexOf('active') !== -1) {
                nextChannel();
            } else {
                var tabs = ['tv', 'radio', 'webcams'];
                var cur = tabs.indexOf(currentSection);
                var newTab = (cur + 1) % tabs.length;
                showSection(tabs[newTab]);
            }
            e.preventDefault();
        } else if (key === 13) { // Enter
            if (currentIndex >= 0) {
                playChannel(currentIndex);
            }
            e.preventDefault();
        }
    };
}

window.onload = function() {
    updateStatus("Приложение загружено (4K)");
    showSection('tv');
    setupKeyboard();
    showInfo("Используйте стрелки ← → для переключения", 3000);
    // Установка начального режима видео
    document.getElementById('video-player').style.objectFit = 'contain';
};
</script>
</body>
