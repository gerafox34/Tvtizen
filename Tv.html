<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TV Player для Samsung Smart TV</title>
<style>
/* ОСНОВНЫЕ СТИЛИ */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    background: #111;
    color: #fff;
    font-family: Arial, sans-serif;
    padding: 10px;
    font-size: 14px;
}

/* ШАПКА */
.header {
    background: #0066cc;
    padding: 15px;
    text-align: center;
    border-radius: 5px;
    margin-bottom: 15px;
}
.header h1 {
    font-size: 20px;
    margin: 0;
}

/* НАВИГАЦИЯ ПО ВКЛАДКАМ */
.tabs {
    display: flex;
    background: #222;
    border-radius: 5px;
    overflow: hidden;
    margin-bottom: 15px;
}
.tab {
    flex: 1;
    padding: 12px 5px;
    background: #333;
    border: none;
    color: #ccc;
    font-size: 14px;
    text-align: center;
    cursor: pointer;
    border-right: 1px solid #444;
    transition: all 0.2s;
}
.tab:last-child {
    border-right: none;
}
.tab.active {
    background: #0066cc;
    color: #fff;
    font-weight: bold;
}
.tab:focus {
    outline: 2px solid #00a8ff;
    background: #0055aa;
}

/* СПИСКИ КАНАЛОВ */
.channel-list {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-bottom: 20px;
}
.channel-btn {
    background: #222;
    border: 2px solid #333;
    color: #fff;
    padding: 12px 8px;
    font-size: 13px;
    text-align: center;
    cursor: pointer;
    border-radius: 5px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
}
.channel-btn.active {
    background: #0066cc;
    border-color: #00a8ff;
    font-weight: bold;
}
.channel-btn:focus,
.channel-btn:hover {
    outline: 2px solid #00a8ff;
    background: #333;
    border-color: #00a8ff;
}
.channel-btn.active:focus {
    outline: 2px solid #fff;
}

/* ПЛЕЕР */
.player {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000;
    z-index: 1000;
    display: none;
    flex-direction: column;
}
.player.active {
    display: flex;
}
.player-header {
    background: #0066cc;
    padding: 12px 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.player-title {
    font-size: 16px;
    font-weight: bold;
}
.player-close {
    background: #cc0000;
    border: none;
    color: #fff;
    width: 35px;
    height: 35px;
    font-size: 18px;
    border-radius: 50%;
    cursor: pointer;
}
.player-close:focus {
    outline: 2px solid #fff;
}
.video-container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 10px;
}
#video-player {
    width: 100%;
    max-width: 1200px;
    max-height: 70vh;
    background: #000;
}
.player-controls {
    background: #222;
    padding: 12px;
    display: flex;
    justify-content: center;
    gap: 15px;
}
.ctrl-btn {
    background: #0066cc;
    border: none;
    color: #fff;
    padding: 10px 20px;
    font-size: 14px;
    border-radius: 5px;
    cursor: pointer;
    min-width: 120px;
}
.ctrl-btn:focus {
    outline: 2px solid #fff;
}
.ctrl-btn:active {
    background: #0055aa;
}

/* РАДИО ПАНЕЛЬ */
.radio-panel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #222;
    padding: 12px 15px;
    border-top: 3px solid #0066cc;
    display: none;
    z-index: 900;
}
.radio-panel.active {
    display: block;
}
.radio-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.radio-text {
    flex: 1;
}
.radio-name {
    font-size: 15px;
    font-weight: bold;
    margin-bottom: 3px;
}
.radio-status {
    font-size: 12px;
    color: #aaa;
}
.radio-controls {
    display: flex;
    gap: 8px;
}
.radio-btn {
    background: #0066cc;
    border: none;
    color: #fff;
    width: 35px;
    height: 35px;
    font-size: 14px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}
.radio-btn:focus {
    outline: 2px solid #fff;
}
.stop-btn {
    background: #cc0000;
}

/* ИНФО ПАНЕЛЬ */
.info-panel {
    position: fixed;
    top: 10px;
    right: 10px;
    background: rgba(0,0,0,0.8);
    padding: 8px 12px;
    border-radius: 5px;
    font-size: 12px;
    color: #0f0;
    display: none;
    z-index: 2000;
}

/* ПАГИНАЦИЯ */
.pagination {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 15px 0;
}
.page-btn {
    background: #333;
    border: none;
    color: #fff;
    padding: 8px 15px;
    border-radius: 3px;
    cursor: pointer;
}
.page-btn.active {
    background: #0066cc;
}
.page-btn:focus {
    outline: 2px solid #00a8ff;
}

/* СТАТУС БАР */
.status-bar {
    position: fixed;
    bottom: 5px;
    left: 10px;
    color: #888;
    font-size: 11px;
}

/* АДАПТИВНОСТЬ */
@media (min-width: 768px) {
    .channel-list {
        grid-template-columns: repeat(3, 1fr);
    }
    .channel-btn {
        font-size: 14px;
        height: 65px;
    }
}
</style>
</head>
<body>

<!-- ШАПКА -->
<div class="header">
    <h1>📺 ТЕЛЕВИЗОР PRO</h1>
</div>

<!-- НАВИГАЦИЯ -->
<div class="tabs">
    <button class="tab active" onclick="showSection('tv')">ТЕЛЕКАНАЛЫ</button>
    <button class="tab" onclick="showSection('radio')">РАДИО</button>
    <button class="tab" onclick="showSection('webcams')">КАМЕРЫ</button>
</div>

<!-- ПАГИНАЦИЯ -->
<div class="pagination" id="pagination"></div>

<!-- ТВ КАНАЛЫ -->
<div id="tv-section">
    <div class="channel-list" id="tv-channels"></div>
</div>

<!-- РАДИО -->
<div id="radio-section" style="display:none">
    <div class="channel-list" id="radio-stations"></div>
</div>

<!-- ВЕБ-КАМЕРЫ -->
<div id="webcams-section" style="display:none">
    <div class="channel-list" id="webcams-list"></div>
</div>

<!-- ВИДЕО ПЛЕЕР -->
<div class="player" id="player">
    <div class="player-header">
        <div class="player-title" id="player-title">Загрузка...</div>
        <button class="player-close" onclick="closePlayer()">✕</button>
    </div>
    <div class="video-container">
        <video id="video-player" controls></video>
    </div>
    <div class="player-controls">
        <button class="ctrl-btn" onclick="prevChannel()">◀ ПРЕДЫДУЩИЙ</button>
        <button class="ctrl-btn" onclick="nextChannel()">СЛЕДУЮЩИЙ ▶</button>
        <button class="ctrl-btn" onclick="toggleFullscreen()">ПОЛНЫЙ ЭКРАН</button>
    </div>
</div>

<!-- РАДИО ПАНЕЛЬ -->
<div class="radio-panel" id="radio-panel">
    <div class="radio-info">
        <div class="radio-text">
            <div class="radio-name" id="radio-title">Выберите радиостанцию</div>

    </div>
</div>

<!-- ИНФО ПАНЕЛЬ -->
<div class="info-panel" id="info-panel"></div>

<!-- СТАТУС БАР -->
<div class="status-bar" id="status-bar">Готов к работе</div>

    {name: "РИФ АКВАРИУМ", url: "https://5ad79df289937.streamlock.net/Aquarium-WebCams/Secret-Reef.stream/chunklist.m3u8"},
    {name: "ПИНГВИНЫ", url: "https://5ad79df289937.streamlock.net/Aquarium-WebCams/Penguins.stream/chunklist.m3u8"},
    {name: "НЬЮ-ЙОРК - ТАЙМС СКВЕР", url: "https://www.earthcam.net/projects/common/js/embedviewer.php?type=h264&vid=hdtimes10.flv"},
    {name: "СТАТУЯ СВОБОДЫ", url: "https://www.earthcam.net/projects/common/js/embedviewer.php?type=h264&vid=statueoflibertyHD.flv"}
];

// ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
function getCurrentChannels() {
    switch(currentSection) {
        case 'tv': return TV_CHANNELS;
        case 'radio': return RADIO_STATIONS;
        case 'webcams': return WEBCAMS;
        default: return [];
    }
}

function getSectionName(section) {
    switch(section) {
        case 'tv': return 'Телеканалы';
        case 'radio': return 'Радиостанции';
        case 'webcams': return 'Веб-камеры';
        default: return section;
    }
}

function stopAllMedia() {
    // Остановить видео
    closePlayer();
    // Остановить радио
    if (audioElement) {
        audioElement.pause();
        audioElement.src = '';
        audioElement = null;
    }
    document.getElementById('radio-panel').classList.remove('active');
    if (errorTimeout) {
        clearTimeout(errorTimeout);
        errorTimeout = null;
    }
}

function updateStatus(msg) {
    var statusDiv = document.getElementById('status-bar');
    if (statusDiv) statusDiv.innerHTML = msg;
    console.log("TV Player: " + msg);
}

function showInfo(msg, duration) {
    var panel = document.getElementById('info-panel');
    panel.innerHTML = msg;
    panel.style.display = 'block';
    if (duration) {
        setTimeout(function() { panel.style.display = 'none'; }, duration);
    }
}

// ========== ПАГИНАЦИЯ ==========
function updatePagination(totalItems) {
    var paginationDiv = document.getElementById('pagination');
    var totalPages = Math.ceil(totalItems / itemsPerPage);
    if (totalPages <= 1) {
        paginationDiv.innerHTML = '';
        return;
    }
    var html = '';
    for (var i = 0; i < totalPages; i++) {
        var active = (i === currentPage) ? 'active' : '';
        html += '<button class="page-btn ' + active + '" onclick="goToPage(' + i + ')">' + (i + 1) + '</button>';
    }
    paginationDiv.innerHTML = html;
}

function goToPage(page) {
    currentPage = page;
    loadChannels();
}

// ========== ЗАГРУЗКА КАНАЛОВ ==========
function loadChannels() {
    var containerId = currentSection + '-channels';
    var container = document.getElementById(containerId);
    var channels = getCurrentChannels();
    container.innerHTML = '';
    var start = currentPage * itemsPerPage;
    var end = Math.min(start + itemsPerPage, channels.length);
    var pageItems = channels.slice(start, end);
    for (var i = 0; i < pageItems.length; i++) {
        var channel = pageItems[i];
        var btn = document.createElement('button');
        btn.className = 'channel-btn';
        btn.innerHTML = channel.name;
        btn.setAttribute('tabindex', '0');
        btn.onclick = (function(index) {
            return function() { playChannel(start + index); };
        })(i);
        container.appendChild(btn);
    }
    updatePagination(channels.length);
    updateStatus(getSectionName(currentSection) + ': ' + channels.length + ' каналов, стр. ' + (currentPage + 1));
}

// ========== ПЕРЕКЛЮЧЕНИЕ РАЗДЕЛОВ ==========
function showSection(section) {
    if (currentSection === section) return;
    // Останавливаем всё воспроизведение
    stopAllMedia();
    currentSection = section;
    currentIndex = -1;
    currentPage = 0;
    // Обновляем активную вкладку
    var tabs = document.getElementsByClassName('tab');
    for (var i = 0; i < tabs.length; i++) {
        tabs[i].classList.remove('active');
        if (tabs[i].getAttribute('onclick') && tabs[i].getAttribute('onclick').includes(section)) {
            tabs[i].classList.add('active');
        }
    }
    // Показываем нужный раздел
    document.getElementById('tv-section').style.display = 'none';
    document.getElementById('radio-section').style.display = 'none';
    document.getElementById('webcams-section').style.display = 'none';
    document.getElementById(section + '-section').style.display = 'block';
    loadChannels();
    updateStatus("Раздел: " + getSectionName(section));
}

// ========== ВОСПРОИЗВЕДЕНИЕ ==========
function playChannel(index) {
    var channels = getCurrentChannels();
    if (index < 0 || index >= channels.length) return;
    currentIndex = index;
    var item = channels[index];
    // Убираем активный класс со всех кнопок и подсвечиваем текущую
    var buttons = document.querySelectorAll('#' + currentSection + '-channels .channel-btn');
    for (var i = 0; i < buttons.length; i++) {
        buttons[i].classList.remove('active');
    }
    var pageIndex = index - (currentPage * itemsPerPage);
    if (buttons[pageIndex]) {
        buttons[pageIndex].classList.add('active');
    }
    if (currentSection === 'radio') {
        playRadio(item);
    } else {
        playVideo(item);
    }
    updateStatus("Играет: " + item.name);
    showInfo(item.name, 2000);
}

function playVideo(item) {
    // Останавливаем радио
    if (audioElement) {
        stopRadio();
    }
    // Открываем видеоплеер
    document.getElementById('player-title').innerHTML = item.name;
    document.getElementById('player').classList.add('active');
    var videoPlayer = document.getElementById('video-player');
    // Убираем старые обработчики
    videoPlayer.onerror = null;
    videoPlayer.oncanplay = null;
    // Устанавливаем источник
    videoPlayer.src = item.url;
    videoPlayer.load();
    // Таймаут для автоматического переключения при ошибке
    if (errorTimeout) clearTimeout(errorTimeout);
    errorTimeout = setTimeout(function() {
        if (videoPlayer.paused || videoPlayer.readyState === 0) {
            showInfo("Не удалось загрузить, переключение...", 1500);
            nextChannel();
        }
    }, 10000); // 10 секунд на загрузку
    // Обработчик ошибок
    videoPlayer.onerror = function() {
        if (errorTimeout) clearTimeout(errorTimeout);
        showInfo("Ошибка воспроизведения, переключение...", 1500);
        setTimeout(nextChannel, 2000);
    };
    // Если видео успешно загрузилось, отменяем таймаут
    videoPlayer.oncanplay = function() {
        if (errorTimeout) clearTimeout(errorTimeout);
        videoPlayer.play().catch(function(e) {
            showInfo("Ошибка запуска, переключение...", 1500);
            setTimeout(nextChannel, 2000);
        });
    };
    // Запускаем воспроизведение
    videoPlayer.play().catch(function(e) {
        // Ошибка может быть из-за нехватки данных, ждём oncanplay
    });
}

function playRadio(item) {
    // Закрываем видеоплеер
    closePlayer();
    // Останавливаем предыдущее радио
    if (audioElement) {
        audioElement.pause();
        audioElement.src = '';
        audioElement = null;
    }
    audioElement = new Audio();
    audioElement.src = item.url;
    audioElement.crossOrigin = 'anonymous';
    audioElement.onplay = function() {
        document.getElementById('radio-toggle').innerHTML = '⏸';
        document.getElementById('radio-status').innerHTML = 'Играет';
    };
    audioElement.onpause = function() {
        document.getElementById('radio-toggle').innerHTML = '▶';
        document.getElementById('radio-status').innerHTML = 'Пауза';
    };
    audioElement.onerror = function() {
        document.getElementById('radio-status').innerHTML = 'Ошибка соединения';
        showInfo("Ошибка радио, переключение...", 1500);
        setTimeout(nextChannel, 2000);
    };
    // Показываем панель радио
    var radioPanel = document.getElementById('radio-panel');
    radioPanel.classList.add('active');
    document.getElementById('radio-title').innerHTML = item.name;
    document.getElementById('radio-status').innerHTML = 'Загрузка...';
    // Запускаем
    setTimeout(function() {
        audioElement.play().catch(function(e) {
            document.getElementById('radio-status').innerHTML = 'Ошибка воспроизведения';
            showInfo("Не удалось запустить радио", 1500);
        });
    }, 500);
}

// ========== УПРАВЛЕНИЕ РАДИО ==========
function toggleRadio() {
    if (audioElement) {
        if (audioElement.paused) audioElement.play();
        else audioElement.pause();
    }
}
function stopRadio() {
    if (audioElement) {
        audioElement.pause();
        audioElement.src = '';
        audioElement = null;
    }
    document.getElementById('radio-panel').classList.remove('active');
    updateStatus("Радио остановлено");
}
function nextRadio() {
    if (currentSection === 'radio') {
        nextChannel();
    }
}

// ========== УПРАВЛЕНИЕ ПЛЕЕРОМ ==========
function closePlayer() {
    var playerDiv = document.getElementById('player');
    if (playerDiv.classList.contains('active')) {
        var videoPlayer = document.getElementById('video-player');
        videoPlayer.pause();
        videoPlayer.src = '';
        videoPlayer.onerror = null;
        videoPlayer.oncanplay = null;
        playerDiv.classList.remove('active');
        if (errorTimeout) clearTimeout(errorTimeout);
        updateStatus("Плеер закрыт");
    }
}
function toggleFullscreen() {
    var player = document.getElementById('player');
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        if (player.requestFullscreen) player.requestFullscreen();
        else if (player.webkitRequestFullscreen) player.webkitRequestFullscreen();
    } else {
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    }
}

// ========== ПЕРЕКЛЮЧЕНИЕ КАНАЛОВ ==========
function prevChannel() {
    var channels = getCurrentChannels();
    if (channels.length === 0) return;
    var newIndex = (currentIndex - 1 + channels.length) % channels.length;
    var newPage = Math.floor(newIndex / itemsPerPage);
    if (newPage !== currentPage) {
        currentPage = newPage;
        loadChannels();
    }
    playChannel(newIndex);
}
function nextChannel() {
    var channels = getCurrentChannels();
    if (channels.length === 0) return;
    var newIndex = (currentIndex + 1) % channels.length;
    var newPage = Math.floor(newIndex / itemsPerPage);
    if (newPage !== currentPage) {
        currentPage = newPage;
        loadChannels();
    }
    playChannel(newIndex);
}

// ========== КЛАВИАТУРА (ПУЛЬТ) ==========
function setupKeyboard() {
    document.body.setAttribute('tabindex', '0'); // чтобы страница получала фокус
    document.body.focus();
    document.onkeydown = function(e) {
        var key = e.keyCode || e.which;
        // ESC - закрыть плеер
        if (key === 27) {
            closePlayer();
            e.preventDefault();
            return;
        }
        // Стрелки влево/вправо
        if (key === 37) { // влево
            if (document.getElementById('player').classList.contains('active')) {
                prevChannel();
            } else {
                // переключение вкладок
                var tabs = ['tv', 'radio', 'webcams'];
                var cur = tabs.indexOf(currentSection);
                var newTab = (cur - 1 + tabs.length) % tabs.length;
                showSection(tabs[newTab]);
            }
            e.preventDefault();
        } else if (key === 39) { // вправо
            if (document.getElementById('player').classList.contains('active')) {
                nextChannel();
            } else {
                var tabs = ['tv', 'radio', 'webcams'];
                var cur = tabs.indexOf(currentSection);
                var newTab = (cur + 1) % tabs.length;
                showSection(tabs[newTab]);
            }
            e.preventDefault();
        } else if (key === 13) { // Enter
            if (currentIndex >= 0) {
                playChannel(currentIndex);
            }
            e.preventDefault();
        }
    };
}

// ========== ИНИЦИАЛИЗАЦИЯ ==========
window.onload = function() {
    updateStatus("Приложение загружено");
    showSection('tv');
    setupKeyboard();
    showInfo("Используйте стрелки ← → для переключения", 3000);
};

// ========== БЫСТРЫЕ ТЕСТЫ ==========
function testTV() {
    if (TV_CHANNELS.length) {
        showSection('tv');
        playChannel(0);
    }
}
function testRadio() {
    if (RADIO_STATIONS.length) {
        showSection('radio');
        playChannel(0);
    }
}
</script>
