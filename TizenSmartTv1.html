function showInfo(msg, duration) {

    panel.innerHTML = msg;

            var p = document.getElementById('info-panel');
            if (p) p.style.display = 'none';
        }, duration);
    }
}

function stopAllMedia() {
    closePlayer();
    if (audioElement) {
        audioElement.pause();
        audioElement.src = '';
        audioElement = null;
    }
    var rp = document.getElementById('radio-panel');
    if (rp) rp.className = 'radio-panel';
    if (errorTimeout) clearTimeout(errorTimeout);
    errorTimeout = null;
}

function updatePagination(totalItems) {
    var paginationDiv = document.getElementById('pagination');
    var totalPages = Math.ceil(totalItems / itemsPerPage);
    if (totalPages <= 1) {
        paginationDiv.innerHTML = '';
        return;
    }
    var html = '';
    for (var i = 0; i < totalPages; i++) {
        var activeClass = (i === currentPage) ? 'active' : '';
        html += '<button class="page-btn ' + activeClass + '" onclick="goToPage(' + i + ')">' + (i+1) + '</button>';
    }
    paginationDiv.innerHTML = html;
}

function goToPage(page) {
    currentPage = page;
    loadChannels();
}

function loadChannels() {
    // ИСПРАВЛЕНИЕ: Используем корректные ID контейнеров
    var containerId = currentSection + '-channels';
    var container = document.getElementById(containerId);
    
    if (!container) {
        console.error('Контейнер не найден: ' + containerId);
        return;
    }

    var channels = getCurrentChannels();
    container.innerHTML = '';
    var start = currentPage * itemsPerPage;
    var end = Math.min(start + itemsPerPage, channels.length);
    
    for (var i = start; i < end; i++) {
        var channel = channels[i];
        var btn = document.createElement('button');
        btn.className = 'channel-btn';
        btn.innerHTML = channel.name;
        btn.setAttribute('tabindex', '0');
        (function(idx) {
            btn.onclick = function() { playChannel(idx); };
        })(i);
        container.appendChild(btn);
    }
    updatePagination(channels.length);
    updateStatus(getSectionName(currentSection) + ': ' + channels.length + ' каналов, стр. ' + (currentPage+1));
}

function showSection(section) {
    if (currentSection === section) return;
    stopAllMedia();
    currentSection = section;
    currentIndex = -1;
    currentPage = 0;
    
    var tabs = document.getElementsByClassName('tab');
    for (var i = 0; i < tabs.length; i++) {
        tabs[i].className = 'tab';
        var onclickAttr = tabs[i].getAttribute('onclick');
        if (onclickAttr && onclickAttr.indexOf(section) !== -1) {
            tabs[i].className = 'tab active';
        }
    }
    
    document.getElementById('tv-section').style.display = 'none';
    document.getElementById('radio-section').style.display = 'none';
    document.getElementById('webcams-section').style.display = 'none';
    document.getElementById(section + '-section').style.display = 'block';
    
    loadChannels();
    updateStatus("Раздел: " + getSectionName(section));
}

function playChannel(index) {
    var channels = getCurrentChannels();
    if (index < 0 || index >= channels.length) return;
    currentIndex = index;
    var item = channels[index];
    
    var btns = document.querySelectorAll('#' + currentSection + '-channels .channel-btn');
    for (var i = 0; i < btns.length; i++) {
        btns[i].className = 'channel-btn';
    }
    var pageIndex = index - (currentPage * itemsPerPage);
    if (btns[pageIndex]) btns[pageIndex].className = 'channel-btn active';
    
    if (currentSection === 'radio') {
        playRadio(item);
    } else {
        playVideo(item);
    }
    updateStatus("Играет: " + item.name);
    showInfo(item.name, 2000);
}

// Функция регулировки формата изображения
function cycleAspectRatio() {
    var modes = ['contain', 'cover', 'fill'];
    var labels = {'contain': '16:9', 'cover': 'ZOOM', 'fill': 'FULL'};
    
    var currentIdx = modes.indexOf(currentAspectRatio);
    var nextIdx = (currentIdx + 1) % modes.length;
    currentAspectRatio = modes[nextIdx];
    
    videoPlayer.className = ''; // Сброс классов
    videoPlayer.classList.add('video-fit-' + currentAspectRatio);
    
    document.getElementById('ar-label').innerHTML = labels[currentAspectRatio];
    showInfo('Формат: ' + labels[currentAspectRatio], 1500);
}

function playVideo(item) {
    if (audioElement) {
        stopRadio();
    }
    
    videoPlayer = document.getElementById('video-player');
    videoPlayer.onerror = null;
    videoPlayer.oncanplay = null;
    if (errorTimeout) clearTimeout(errorTimeout);
    
    document.getElementById('player-title').innerHTML = item.name;
    document.getElementById('player').className = 'player active';
    
    // Применяем текущий формат
    videoPlayer.className = '';
    videoPlayer.classList.add('video-fit-' + currentAspectRatio);
    
    // Показываем индикатор 4K если доступно
    var resInd = document.getElementById('res-indicator');
    if (is4K) {
        resInd.classList.add('show');
        setTimeout(function() { resInd.classList.remove('show'); }, 3000);
    }
    
    videoPlayer.src = item.url;
    videoPlayer.load();
    
    errorTimeout = setTimeout(function() {
        if (videoPlayer.paused || videoPlayer.readyState === 0) {
            showInfo("Загрузка... ожидание потока", 2000);
        }
    }, 8000);
    
    videoPlayer.onerror = function() {
        if (errorTimeout) clearTimeout(errorTimeout);
        showInfo("Ошибка потока, пробую следующий...", 2000);
        setTimeout(nextChannel, 2500);
    };
    
    videoPlayer.oncanplay = function() {
        if (errorTimeout) clearTimeout(errorTimeout);
        videoPlayer.play().catch(function(e) {
            console.log('Autoplay blocked, waiting for interaction');
        });
    };
    
    videoPlayer.play().catch(function(e) {});
    
    // Авто-фуллскрин для ТВ
    setTimeout(function() {
        toggleFullscreen();
    }, 500);
}

function playRadio(item) {
    closePlayer();
    
    if (audioElement) {
        audioElement.pause();
        audioElement.src = '';
        audioElement = null;
    }
    
    audioElement = new Audio();
    audioElement.src = item.url;
    audioElement.crossOrigin = 'anonymous';
    
    audioElement.onplay = function() {
        var toggleBtn = document.getElementById('radio-toggle');
        if (toggleBtn) toggleBtn.innerHTML = '⏸';
        var statusSpan = document.getElementById('radio-status');
        if (statusSpan) statusSpan.innerHTML = '🔊 Играет';
    };
    
    audioElement.onpause = function() {
        var toggleBtn = document.getElementById('radio-toggle');
        if (toggleBtn) toggleBtn.innerHTML = '▶';
        var statusSpan = document.getElementById('radio-status');
        if (statusSpan) statusSpan.innerHTML = '⏸ Пауза';
    };
    
    audioElement.onerror = function() {
        var statusSpan = document.getElementById('radio-status');
        if (statusSpan) statusSpan.innerHTML = '❌ Ошибка';
        showInfo("Ошибка радио, переключаю...", 2000);
        setTimeout(nextChannel, 2500);
    };
    
    var rp = document.getElementById('radio-panel');
    rp.className = 'radio-panel active';
    document.getElementById('radio-title').innerHTML = item.name;
    document.getElementById('radio-status').innerHTML = '📡 Загрузка...';
    
    // ИСПРАВЛЕНИЕ: Убран setTimeout, воспроизведение сразу
    audioElement.play().catch(function(e) {
        var st = document.getElementById('radio-status');
        if (st) st.innerHTML = '⚠️ Ожидание';
        console.log('Radio play error:', e);
        // Повторная попытка
        setTimeout(function() {
            audioElement.play().catch(function(err) {
                showInfo("Не удалось запустить радио", 2000);
            });
        }, 1000);
    });
}

function toggleRadio() {
    if (audioElement) {
        if (audioElement.paused) audioElement.play();
        else audioElement.pause();
    }
}

function stopRadio() {
    if (audioElement) {
        audioElement.pause();
        audioElement.src = '';
        audioElement = null;
    }
    var rp = document.getElementById('radio-panel');
    if (rp) rp.className = 'radio-panel';
    updateStatus("Радио остановлено");
}

function nextRadio() {
    if (currentSection === 'radio') nextChannel();
}

function closePlayer() {
    var playerDiv = document.getElementById('player');
    if (playerDiv.className.indexOf('active') !== -1) {
        var vp = document.getElementById('video-player');
        vp.pause();
        vp.src = '';
        vp.onerror = null;
        vp.oncanplay = null;
        playerDiv.className = 'player';
        if (errorTimeout) clearTimeout(errorTimeout);
        
        // Выход из фуллскрина
        if (document.fullscreenElement || document.webkitFullscreenElement) {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        }
        
        updateStatus("Плеер закрыт");
    }
}

function toggleFullscreen() {
    var player = document.getElementById('player');
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        if (player.requestFullscreen) player.requestFullscreen();
        else if (player.webkitRequestFullscreen) player.webkitRequestFullscreen();
    } else {
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    }
}

function prevChannel() {
    var channels = getCurrentChannels();
    if (channels.length === 0) return;
    var newIndex = (currentIndex - 1 + channels.length) % channels.length;
    var newPage = Math.floor(newIndex / itemsPerPage);
    if (newPage !== currentPage) {
        currentPage = newPage;
        loadChannels();
    }
    playChannel(newIndex);
}

function nextChannel() {
    var channels = getCurrentChannels();
    if (channels.length === 0) return;
    var newIndex = (currentIndex + 1) % channels.length;
    var newPage = Math.floor(newIndex / itemsPerPage);
    if (newPage !== currentPage) {
        currentPage = newPage;
        loadChannels();
    }
    playChannel(newIndex);
}

function setupKeyboard() {
    document.body.setAttribute('tabindex', '0');
    document.body.focus();
    document.onkeydown = function(e) {
        var key = e.keyCode || e.which;
        if (key === 27) { // ESC / RETURN
            closePlayer();
            e.preventDefault();
            return;
        }
        if (key === 37) { // LEFT
            if (document.getElementById('player').className.indexOf('active') !== -1) {
                prevChannel();
            } else {
                var tabs = ['tv', 'radio', 'webcams'];
                var cur = tabs.indexOf(currentSection);
                var newTab = (cur - 1 + tabs.length) % tabs.length;
                showSection(tabs[newTab]);
            }
            e.preventDefault();
        } else if (key === 39) { // RIGHT
            if (document.getElementById('player').className.indexOf('active') !== -1) {
                nextChannel();
            } else {
                var tabs = ['tv', 'radio', 'webcams'];
                var cur = tabs.indexOf(currentSection);
                var newTab = (cur + 1) % tabs.length;
                showSection(tabs[newTab]);
            }
            e.preventDefault();
        } else if (key === 13) { // ENTER
            if (currentIndex >= 0) {
                playChannel(currentIndex);
            }
            e.preventDefault();
        } else if (key === 48) { // 0 - Toggle Aspect Ratio
            if (document.getElementById('player').className.indexOf('active') !== -1) {
                cycleAspectRatio();
                e.preventDefault();
            }
        }
    };
}

window.onload = function() {
    updateStatus("Samsung 4K TV Player загружен");
    showSection('tv');
    setupKeyboard();
    showInfo("Используйте ← → для навигации, 0 для формата", 4000);
};
</script>
